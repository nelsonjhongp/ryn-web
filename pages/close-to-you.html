<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Close to You R ❤️</title>
  <link rel="icon" type="image/png" href="../img/love-icon.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body{
      background: linear-gradient(135deg,#fff7fb,#f3fbff);
      font-family: 'Quicksand', sans-serif;
      color:#3a3a44;
      min-height:100vh;
    }
    .hero-title{font-family:'Playfair Display',serif;}
    .soft-card{background:#ffffffcc;backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(140,170,210,.25);border:1px solid rgba(255,255,255,.6);}
    .btn-heart{background:linear-gradient(135deg,#ff7aa2,#ffb3c7);border:none;color:white;box-shadow:0 .5rem 1.25rem rgba(255,122,162,.35);}
    .btn-heart:hover{filter:brightness(1.05);}
    .video-embed{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:1rem;box-shadow:0 12px 28px rgba(0,0,0,.08);} 
    .video-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
    .typewriter-cursor{display:inline-block;width:1ch;animation:blink 1s steps(1) infinite;}
    @keyframes blink{50%{color:transparent;}}
  </style>
</head>
<body>
  <main class="container py-5 text-center">
    <h1 class="hero-title display-5 mb-3">Cerca de ti, Rosario ❤️</h1>
    <div class="soft-card rounded-4 p-4 d-inline-block">
      <p class="mb-0 fs-5">Cada vez que la melodía suene, quiero que sientas paz. Estoy cerca de ti, hoy y siempre.</p>
      <div class="d-flex justify-content-center mt-3 gap-2">
        <audio id="melodia" preload="auto" autoplay loop>
          <source src="../audio/closetoyou.ogg" type="audio/ogg">
        </audio>
        <button class="btn btn-heart btn-sm" onclick="document.getElementById('melodia').play()">▶️ Reproducir</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('melodia').pause()">⏸️ Pausar</button>
      </div>
    </div>

    <div class="mt-5">
      <div class="video-embed">
        <iframe id="ytPlayer" src="https://www.youtube.com/embed/lwG3QlOC0lg?enablejsapi=1" title="Close to You - Unboxing" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
    </div>

    <div class="mt-4 soft-card rounded-4 p-4 text-start mx-auto" style="max-width:720px;">
      <div class="d-flex justify-content-between align-items-center">
        <h3 class="h6 mb-0">Poema</h3>
        <button id="btnPoema" class="btn btn-heart btn-sm">Leer poema</button>
      </div>
      <div id="poema" class="fs-5 mt-3" style="min-height:5rem;">
        <span class="text-muted">Haz clic en “Leer poema” para revelarlo.</span>
      </div>
    </div>

    <footer class="mt-5">
      <p class="mb-1">Hecho con amor por Nelson para Rosario.</p>
      <small class="text-muted">© <span id="year"></span> — Siempre contigo.</small>
    </footer>
  </main>

  <script>
    const audioEl = document.getElementById('melodia');
    document.addEventListener('DOMContentLoaded', () => {
      const playPromise = audioEl.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          document.body.addEventListener('click', () => audioEl.play(), { once: true });
        });
      }
    });

    let ytPlayer;
    function onYouTubeIframeAPIReady(){
      ytPlayer = new YT.Player('ytPlayer', {
        events: {
          'onStateChange': (ev) => {
            if (ev.data === YT.PlayerState.PLAYING) {
              if (!audioEl.paused) audioEl.pause();
            }
          }
        }
      });
    }
    (function(){
      const tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
      window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
    })();

    const POEMA_TXT = `A veces las palabras no alcanzan,\npor eso te regalo esta melodía.\nQue cada nota te abrace suave,\ncomo mis manos cuando el mundo pesa.\n\nSi un día te sientes cansada,\npon la cajita a cantar.\nCierra los ojos, respira hondo:\nmi amor está cerca, contigo.\n\nClose to You — como late mi corazón:\nsuave, constante, por ti.`;

    document.getElementById('year').textContent = new Date().getFullYear();

    const btnPoema = document.getElementById('btnPoema');
    const poemaEl = document.getElementById('poema');
    let writing=false;
    btnPoema.addEventListener('click',()=>{
      if(writing)return;writing=true;poemaEl.innerHTML='';typewriter(poemaEl,POEMA_TXT);
    });
    function typewriter(node,text){
      let i=0;const speed=20;
      const cursor=document.createElement('span');cursor.className='typewriter-cursor';cursor.textContent='|';node.appendChild(cursor);
      const write=()=>{
        if(i<text.length){const ch=text[i++];if(ch==='\n'){node.insertBefore(document.createElement('br'),cursor);}else{node.insertBefore(document.createTextNode(ch),cursor);}setTimeout(write,(ch==='.'||ch===','||ch===';')?speed*5:speed);}else{cursor.remove();writing=false;}}
      write();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
